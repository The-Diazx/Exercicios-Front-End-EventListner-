<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletor de Arquivos</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .upload-container { border: 2px dashed #ccc; padding: 20px; width: 300px; text-align: center; }
        #nomeArquivo { margin-top: 10px; font-weight: bold; color: #2980b9; }
    </style>
</head>
<body>
    <div class="Upload-container">
        <input type="file" id="inputArquivo">
        <div id="nomeArquivo">Nenhum arquivo selecionado</div>

        <script>
            const inputArquivo = document.getElementById('inputArquivo');
            const displayNome = document.getElementById('nomeArquivo');

            inputArquivo.addEventListener('change', function(){
                if(this.files && this.files.length > 0){
                    const nome = this.files[0].name;
                    displayNome.textContent = `Arquivo selecionado: ${nome}`;
                }else{
                    displayNome.textContent = "Nenhum arquivo selecionado";
                }
                });
        </script>
    </div>
    
</body>
</html>
