<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comentário na Rede Social</title>
    <style>
        .container { font-family: sans-serif; width: 400px; margin: 20px auto; }
        textarea { width: 100%; height: 100px; resize: none; padding: 10px; box-sizing: border-box; }
        .contador { text-align: right; font-size: 0.9em; margin-top: 5px; color: #555; }
        .limite-atingido { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h3> Deixe seu comentario:</h3>
        <textarea id="campoComentario" maxlength="200" placeholder="Digite o comentario aqui..."></textarea>
        <div id="contador" class="contador">200 caracteres restantes</div>
        </div>

    <script>
        const textarea= document.getElementById('campoComentario');
        const contador = document.getElementById('contador');
        const limiteMaximo = 200;

        textarea.addEventListener('input', function(){
            const caracteresDigitados = textarea.value.length;
            const caracteresRestantes = limiteMaximo - caracteresDigitados;

            contador.textContent = `caracteres restantes: ${caracteresRestantes}`;

            if (caracteresRestantes === 0 ){
                contador.classList.add('limite-atingido');
            } else{ 
                contador.classList.remove('limite-atingido');
            }
        });

        </script>
    
</body>
</html>
