<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtro Dinâmico</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #campoBusca { padding: 10px; width: 300px; margin-bottom: 20px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ddd; width: 300px; }
        .oculto { display: none; }
    </style>
</head>
<body>
    
    <input type="text" id="campoBusca" placeholder="Pesquisar Filme...">
    <ul id="listaFilmes">
        <li>Elisa & Kid</li>
        <li>Mia & Celso</li>
        <li>Unijorge o terror dos alunos</li>
        <li>O dia que o Celso virou Vitoria</li>
    </ul>

    <script> 
        const campoBusca = document.getElementById('campoBusca');
        const listaFilmes = document.getElementById('listaFilmes');
        const itensFilmes = listaFilmes.querySelectorAll('li');

        campoBusca.addEventListener('input', function(){
            const termoBusca = campoBusca.value.toLowerCase();

            itensFilmes.forEach(function(filme){
                const tituloFilme = filme.textContent.toLowerCase();

                if(tituloFilme.includes(termoBusca)){
                    filme.classList.remove('oculto');
                }else{
                    filme.classList.add('oculto');
                }
            });
        });
    </script>
</body>
</html>
